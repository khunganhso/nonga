</div>

<h2 className="mb-6 text-2xl font-bold text-[#181818] uppercase">NỘI DUNG: {activeCategory.replace(/-/g, " ")}</h2>
{filteredLessons.length > 0 ? (
<div className="grid grid-cols-1 gap-6 md:grid-cols-2 lg:grid-cols-3">
{filteredLessons.map(lesson => (
<LessonCard key={lesson.id} lesson={lesson} onClick={() => setSelectedLesson(lesson)} />
))}
</div>
) : (
<div className="mt-10 flex flex-col items-center justify-center rounded-xl border-2 border-dashed border-[#CFE9FE] bg-white p-12 text-center">
<span className="text-4xl mb-4">🚧</span>
<h3 className="text-lg font-bold text-[#181818]">Nội dung đang được cập nhật</h3>
</div>
)}
</div>
</main>
{selectedLesson && (
<div className="fixed inset-0 z-50 flex items-center justify-center bg-black/75 p-4 backdrop-blur-sm">
<button onClick={() => setSelectedLesson(null)} className="absolute right-6 top-6 text-white hover:text-gray-300 transition-transform hover:rotate-90 z-[60]">
<svg className="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
</button>
<div className="flex h-[90vh] w-full max-w-6xl flex-col overflow-hidden rounded-2xl bg-white shadow-2xl lg:flex-row">
<div className="w-full bg-[#032D60] lg:w-3/5 flex flex-col items-center justify-center relative">
{selectedLesson.youtubeId ? (
<div className="relative h-full w-full bg-black">
<iframe
className="absolute inset-0 h-full w-full"
src={`https://www.youtube-nocookie.com/embed/${selectedLesson.youtubeId}?autoplay=1&modestbranding=1&rel=0&fs=0`}
title={selectedLesson.title}
allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
sandbox="allow-scripts allow-same-origin allow-presentation"
></iframe>
</div>
) : selectedLesson.thumbnail ? (
<img src={selectedLesson.thumbnail} alt={selectedLesson.title} className="h-full w-full object-cover" />
) : (
<div className="flex flex-col items-center justify-center p-10 text-center text-white">
<span className="text-8xl mb-6">{selectedLesson.icon || "📚"}</span>
</div>
)}
</div>
<div className="flex w-full flex-col bg-white lg:w-2/5">
<div className="border-b border-[#E5E5E5] bg-gray-50 px-8 py-6">
<div className="mb-2 flex items-center gap-3 text-xs font-semibold">
<span className="rounded-full bg-[#FFF3E0] px-3 py-1 text-[#E87722]">⭐ {selectedLesson.points} điểm</span>
<span className="text-[#706E6B]">{selectedLesson.duration}</span>
</div>
<h2 className="text-2xl font-bold text-[#181818]">{selectedLesson.title}</h2>
</div>
<div className="prose prose-sm flex-1 overflow-y-auto px-8 py-6 text-[#444444]" dangerouslySetInnerHTML={{ __html: selectedLesson.content || "<p>Nội dung đang cập nhật...</p>" }} />
</div>
</div>
</div>
)}
</div>
);
}

// =========================================================================
// 6. ỨNG DỤNG CHÍNH (XỬ LÝ ĐĂNG NHẬP)
// =========================================================================
function App() {
const CORRECT_PASSWORD = "nonganewgen2026";
const [password, setPassword] = useState("");
const [isAuthorized, setIsAuthorized] = useState(false);
const [error, setError] = useState("");
const [isLoading, setIsLoading] = useState(true);

useEffect(() => {
const authStatus = sessionStorage.getItem("web_authorized");
if (authStatus === "true") setIsAuthorized(true);
setIsLoading(false);
}, []);

const handleLogin = (e) => {
e.preventDefault();
if (password === CORRECT_PASSWORD) {
sessionStorage.setItem("web_authorized", "true");
setIsAuthorized(true);
setError("");
} else {
setError("❌ Mật khẩu không chính xác. Vui lòng kiểm tra lại!");
}
};

if (isLoading) return <div className="min-h-screen bg-[#032D60]"></div>;
if (isAuthorized) return <Dashboard />;

return (
<div className="flex min-h-screen items-center justify-center bg-[#F3F2F2] p-4">
<div className="w-full max-w-md overflow-hidden rounded-2xl border border-[#E5E5E5] bg-white shadow-xl">
<div className="bg-[#032D60] px-6 py-8 text-center text-white">
<div className="mx-auto mb-3 flex h-14 w-14 items-center justify-center rounded-full bg-[#0176D3] shadow-md">
<svg className="h-7 w-7 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5"><path strokeLinecap="round" strokeLinejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>
</div>
<h1 className="text-2xl font-bold tracking-tight">Hệ Thống Nội Bộ</h1>
<p className="mt-1 text-sm text-white/70">Nền tảng đào tạo kỹ thuật nông nghiệp Newgen</p>
</div>
<form onSubmit={handleLogin} className="p-6 space-y-5">
<div>
<label className="block text-xs font-bold uppercase tracking-wider text-[#706E6B] mb-2">Nhập mã khóa truy cập:</label>
<input type="password" placeholder="••••••••" value={password} onChange={(e) => setPassword(e.target.value)} className="w-full rounded-lg border border-[#E5E5E5] px-4 py-3 text-lg transition-all focus:border-[#0176D3] focus:outline-none focus:ring-2 focus:ring-[#0176D3]/20" required />
</div>
{error && <p className="text-sm font-semibold text-[#C23934] bg-[#FFEAEA] p-3 rounded-lg border border-[#FCD2D2]">{error}</p>}
<button type="submit" className="w-full rounded-lg bg-[#0176D3] py-3 text-center text-base font-bold text-white shadow-md transition-all hover:bg-[#014486] focus:outline-none focus:ring-2 focus:ring-[#0176D3]/50">Mở khóa hệ thống</button>
</form>
<div className="border-t border-[#E5E5E5] bg-gray-50 px-6 py-4 text-center text-xs text-[#706E6B]">
Chỉ dành cho nhân viên và đại lý ủy quyền.
<br/>Mọi hành vi truy cập trái phép sẽ bị ghi lại lịch sử.
</div>
</div>
</div>
);
}

// =========================================================================
// 7. KHỞI CHẠY ỨNG DỤNG
// =========================================================================
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
