const currentMenu = mainMenus.find(m => m.id === activeMenuId);
const filteredLessons = lessons.filter(lesson => lesson.categoryId === activeSubMenuId);

const handleMenuChange = (menuId) => {
  setActiveMenuId(menuId);
  const menu = mainMenus.find(m => m.id === menuId);
  if (menu && menu.subItems && menu.subItems.length > 0) {
    setActiveSubMenuId(menu.subItems[0].id);
  }

            </h2>
            <p className="text-google-textSecondary text-sm">
              Bạn đang xem phân mục <strong>{currentMenu.subItems.find(s=>s.id===activeSubMenuId)?.name}</strong>. Chọn thẻ bài học bên dưới để bắt đầu.
            </p>
          </div>
        </div>

        {/* Lưới bài học */}
        {filteredLessons.length > 0 ? (
          <div className="grid grid-cols-1 gap-6 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4">
            {filteredLessons.map(lesson => (
              <LessonCard key={lesson.id} lesson={lesson} onClick={() => setSelectedLesson(lesson)} />
            ))}
          </div>
        ) : (
          <div className="mt-12 flex flex-col items-center justify-center rounded-3xl border border-dashed border-gray-300 bg-gray-50/50 p-16 text-center">
            <div className="h-16 w-16 mb-4 rounded-full bg-gray-100 flex items-center justify-center text-gray-400">
               <svg className="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>
            </div>
            <h3 className="text-[17px] font-semibold text-google-text mb-1">Chưa có nội dung</h3>
            <p className="text-google-textSecondary text-sm">Quản trị viên đang cập nhật tài liệu cho phần này.</p>
          </div>
        )}
      </div>
    </div>
  </main>

  {/* POPUP CHI TIẾT BÀI HỌC (Modal) */}
  {selectedLesson && (
    <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/60 p-4 sm:p-6 backdrop-blur-sm transition-opacity">
      <div className="relative flex max-h-[90vh] w-full max-w-5xl flex-col overflow-hidden rounded-[24px] bg-white shadow-2xl lg:flex-row">
        
        {/* Nút Đóng Modal */}
        <button onClick={() => setSelectedLesson(null)} className="absolute right-4 top-4 z-[60] flex h-10 w-10 items-center justify-center rounded-full bg-black/10 text-gray-500 hover:bg-black/20 hover:text-gray-800 backdrop-blur-md transition-all lg:bg-gray-100 lg:hover:bg-gray-200">
          <svg className="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
        </button>

        {/* Khung Trái - Media */}
        <div className="w-full bg-gray-50 lg:w-3/5 flex flex-col relative border-b lg:border-b-0 lg:border-r border-google-border">
          {selectedLesson.youtubeId ? (
            <div className="relative h-64 lg:h-full w-full bg-black">
              <iframe className="absolute inset-0 h-full w-full" src={`https://www.youtube-nocookie.com/embed/${selectedLesson.youtubeId}?autoplay=1&modestbranding=1&rel=0&fs=0`} title={selectedLesson.title} allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" sandbox="allow-scripts allow-same-origin allow-presentation"></iframe>
            </div>
          ) : selectedLesson.thumbnail ? (
            <div className="h-64 lg:h-full w-full p-8 flex items-center justify-center">
               <img src={selectedLesson.thumbnail} alt={selectedLesson.title} className="max-h-full w-auto object-contain rounded-xl shadow-sm" />
            </div>
          ) : (
            <div className="flex h-64 lg:h-full flex-col items-center justify-center text-gray-300">
              <span className="text-8xl">{selectedLesson.icon || "📚"}</span>
            </div>
          )}
        </div>

        {/* Khung Phải - Nội dung */}
        <div className="flex w-full flex-col bg-white lg:w-2/5 max-h-[50vh] lg:max-h-none overflow-y-auto">
          <div className="px-8 pt-8 pb-4">
            <div className="mb-3 flex items-center gap-3 text-[13px] font-medium">
              <span className="flex items-center gap-1 text-amber-700 bg-amber-50 px-2.5 py-1 rounded-md border border-amber-100">
                ⭐ {selectedLesson.points} điểm
              </span>
              <span className="text-google-textSecondary">{selectedLesson.duration}</span>
            </div>
            <h2 className="text-2xl font-bold text-google-text leading-tight">{selectedLesson.title}</h2>
          </div>
          <div className="prose prose-sm px-8 pb-8 text-google-textSecondary" dangerouslySetInnerHTML={{ __html: selectedLesson.content || "<p>Nội dung đang cập nhật...</p>" }} />
        </div>
      </div>
    </div>
  )}
</div>
);
}

// =========================================================================
// 6. ỨNG DỤNG CHÍNH (XỬ LÝ ĐĂNG NHẬP)
// =========================================================================
function App() {
const CORRECT_PASSWORD = "nonganewgen2026";
const [password, setPassword] = useState("");
const [isAuthorized, setIsAuthorized] = useState(false);
const [error, setError] = useState("");
const [isLoading, setIsLoading] = useState(true);

useEffect(() => {
const authStatus = sessionStorage.getItem("web_authorized");
if (authStatus === "true") setIsAuthorized(true);
setIsLoading(false);
}, []);

const handleLogin = (e) => {
e.preventDefault();
if (password === CORRECT_PASSWORD) {
sessionStorage.setItem("web_authorized", "true");
setIsAuthorized(true);
setError("");
} else {
setError("Mật khẩu không chính xác. Vui lòng thử lại.");
}
};

if (isLoading) return <div className="min-h-screen bg-google-surface"></div>;
if (isAuthorized) return <Dashboard />;

return (
<div className="flex min-h-screen items-center justify-center bg-google-bg p-4">
  <div className="w-full max-w-[400px] overflow-hidden rounded-[24px] border border-google-border bg-white shadow-xl p-8 sm:p-10">
    <div className="text-center mb-8">
      <div className="mx-auto mb-5 flex h-16 w-16 items-center justify-center rounded-2xl bg-google-blue shadow-md shadow-blue-500/20">
        <svg className="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M12 21v-8.25M15.75 21v-8.25M8.25 21v-8.25M3 9l9-6 9 6m-1.5 12V10.332A48.315 48.315 0 0012 9.75c-2.551 0-5.056.2-7.5.582V21M3 21h18M12 6.75h.008v.008H12V6.75z" /></svg>
      </div>
      <h1 className="text-2xl font-bold tracking-tight text-google-text mb-2">Đăng nhập hệ thống</h1>
      <p className="text-sm text-google-textSecondary">Đào tạo kỹ thuật nông nghiệp Newgen</p>
    </div>

    <form onSubmit={handleLogin} className="space-y-5">
      <div>
        <input 
          type="password" 
          placeholder="Nhập mã khóa truy cập..." 
          value={password} 
          onChange={(e) => setPassword(e.target.value)} 
          className="w-full rounded-xl border border-gray-300 bg-gray-50 px-4 py-3.5 text-[15px] transition-all focus:border-google-blue focus:bg-white focus:outline-none focus:ring-4 focus:ring-google-lightBlue" 
          required 
        />
      </div>
      {error && (
        <div className="flex items-center gap-2 text-[13px] font-medium text-red-600 bg-red-50 p-3 rounded-xl border border-red-100">
          <svg className="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clipRule="evenodd"></path></svg>
          {error}
        </div>
      )}
      <button type="submit" className="w-full rounded-xl bg-google-blue py-3.5 text-center text-[15px] font-semibold text-white shadow-sm transition-all hover:bg-[#0842A0] focus:outline-none focus:ring-4 focus:ring-google-lightBlue">
        Mở khóa hệ thống
      </button>
    </form>
    
    <p className="mt-8 text-center text-[12px] text-gray-400">
      Mọi hành vi truy cập trái phép sẽ bị ghi lại.
    </p>
  </div>
</div>
);
}

// =========================================================================
// 7. KHỞI CHẠY ỨNG DỤNG
// =========================================================================
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
