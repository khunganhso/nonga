// =========================================================================
// 3. GIAO DIỆN HIỂN THỊ TỪNG BÀI

function LessonRow({ lesson }) {
  const containerRef = useRef(null);
  const [isFullscreen, setIsFullscreen] = useState(false);

  useEffect(() => {
    const onFullscreenChange = () => { setIsFullscreen(!!document.fullscreenElement); };
    document.addEventListener('fullscreenchange', onFullscreenChange);
    return () => document.removeEventListener('fullscreenchange', onFullscreenChange);
  }, []);

  const handleFullScreen = () => {
    if (!document.fullscreenElement && containerRef.current) {
      containerRef.current.requestFullscreen().catch(err => console.log(err));
    }
  };

  const hasContent = lesson.content ? lesson.content.trim() !== "" : false;

  const renderMedia = () => {
    if (lesson.canvaUrl) {
      // Để khung tự động dãn chiều cao cho bản Canva
      return (
        <iframe className="w-full min-h-[75vh] md:min-h-[800px] bg-white block" src={lesson.canvaUrl} allowFullScreen allow="fullscreen" style={{border: 'none'}} title={`Canva - ${lesson.title}`}></iframe>
      );
    } else if (lesson.youtubeId) {
      return (
        <div className="relative w-full aspect-video bg-white">
          <iframe className="absolute inset-0 w-full h-full" src={`https://www.youtube-nocookie.com/embed/${lesson.youtubeId}?modestbranding=1&rel=0`} allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowFullScreen title={`Youtube - ${lesson.title}`}></iframe>
        </div>
      );
    } else if (lesson.thumbnail) {
      return <img src={lesson.thumbnail} alt={lesson.title} className="w-full h-auto block bg-white" />;
    } else {
      return (
        <div className="w-full aspect-video flex flex-col items-center justify-center text-gray-400 p-10 text-center bg-gray-50">
          <svg className="w-16 h-16 mb-4 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
          <p className="text-[15px] font-medium">Chưa có Slide/Video.</p>
        </div>
      );
    }
  };

  if (hasContent) {
    return (
      <div className="flex flex-col lg:flex-row gap-8 bg-white rounded-[24px] border border-google-border p-4 sm:p-6 shadow-sm mb-8">
        <div className="w-full lg:w-1/2 flex flex-col pt-2">
          <h2 className="text-[20px] sm:text-[22px] font-bold text-google-text mb-4 uppercase tracking-tight leading-snug">{lesson.title}</h2>
          <div className="prose max-w-none flex-1" dangerouslySetInnerHTML={{ __html: lesson.content || "" }} />
        </div>
        <div className="w-full lg:w-1/2 rounded-[16px] overflow-hidden bg-white border border-gray-100 relative shadow-sm">
          {renderMedia()}
        </div>
      </div>
    );
  }

  return (
    <div className="flex flex-col bg-white rounded-[24px] border border-google-border p-2 sm:p-4 shadow-sm mb-8 overflow-hidden">
      <h2 className="text-[22px] sm:text-[24px] font-bold text-google-text mt-2 mb-4 uppercase tracking-tight leading-snug text-center">{lesson.title}</h2>
      <div ref={containerRef} className="w-full rounded-[16px] overflow-hidden bg-white relative group border border-gray-100 shadow-sm">
        {renderMedia()}
        {!isFullscreen && (lesson.canvaUrl || lesson.youtubeId) && (
          <div className="absolute inset-0 z-10 cursor-pointer pointer-events-none" onClick={handleFullScreen}>
             <div className="absolute top-4 right-4 bg-black/70 text-white px-3.5 py-2 rounded-lg text-sm font-medium opacity-0 group-hover:opacity-100 transition-opacity flex items-center gap-2 backdrop-blur-md pointer-events-auto">
                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg>
                Bấm xem toàn màn hình
             </div>
          </div>
        )}
      </div>
    </div>
  );
}

// =========================================================================
// 4. GIAO DIỆN CHÍNH (GIAO DIỆN NGANG CHO MOBILE & PC)
// =========================================================================
function Dashboard() {
  const [activeMenuId, setActiveMenuId] = useState(mainMenus[0].id);
  const [activeSubMenuId, setActiveSubMenuId] = useState("ALL"); 

  const currentMenu = mainMenus.find(m => m.id === activeMenuId) || mainMenus[0];

  const filteredLessons = lessons.filter(lesson => {
    if (activeSubMenuId === "ALL") {
      return currentMenu.subItems ? currentMenu.subItems.some(sub => sub.id === lesson.categoryId) : false;
    }
    return lesson.categoryId === activeSubMenuId;
  });

  const handleMenuChange = (menuId) => {
    setActiveMenuId(menuId);
    setActiveSubMenuId("ALL"); 
  };

  return (
  <div className="flex flex-col h-screen w-full overflow-hidden bg-google-surface">
    
    <div className="flex items-center gap-3 px-4 sm:px-6 py-3 bg-white border-b border-google-border flex-shrink-0">
      <div className="flex h-10 w-10 flex-shrink-0 items-center justify-center rounded-xl bg-google-blue shadow-sm">
        <svg className="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
          <path strokeLinecap="round" strokeLinejoin="round" d="M12 21v-8.25M15.75 21v-8.25M8.25 21v-8.25M3 9l9-6 9 6m-1.5 12V10.332A48.315 48.315 0 0012 9.75c-2.551 0-5.056.2-7.5.582V21M3 21h18M12 6.75h.008v.008H12V6.75z" />
        </svg>
      </div>
      <div>
        <h1 className="text-xl font-bold tracking-tight text-google-text leading-tight">Trailhead</h1>
        <p className="text-[12px] font-medium text-google-textSecondary leading-tight">Agriculture Training</p>
      </div>
    </div>

    <div className="bg-white px-4 sm:px-6 py-2 flex items-center overflow-x-auto border-b border-google-border flex-shrink-0 gap-2 scrollbar-hide">
      {mainMenus.map((item) => {
        const isActive = activeMenuId === item.id;
        return (
          <button
            key={item.id}
            onClick={() => handleMenuChange(item.id)}
            className={`flex flex-shrink-0 items-center gap-2 rounded-full px-4 py-2 text-[14px] font-semibold uppercase tracking-wide transition-all duration-200 
            ${isActive 
              ? "bg-google-lightBlue text-google-blue" 
              : "text-google-textSecondary hover:bg-black/5 hover:text-google-text"
            }`}
          >
            <item.icon />
            <span className="whitespace-nowrap">{item.name}</span>
          </button>
        );
      })}
    </div>

    <div className="bg-google-surface/90 backdrop-blur-md px-4 sm:px-6 py-3 flex items-center overflow-x-auto border-b border-google-border flex-shrink-0 gap-2 scrollbar-hide">
      <button
        onClick={() => setActiveSubMenuId("ALL")}
        className={`flex-shrink-0 px-4 py-2 rounded-full text-[14px] font-medium transition-all duration-200 border 
          ${activeSubMenuId === "ALL" 
          ? "bg-google-blue text-white border-google-blue shadow-sm" 
          : "bg-white text-google-textSecondary border-gray-200 hover:bg-gray-50 hover:text-google-text"
        }`}
      >
        Tất Cả Mục
      </button>
      {currentMenu.subItems && currentMenu.subItems.map(sub => {
        const isSubActive = activeSubMenuId === sub.id;
        return (
          <button
            key={sub.id}
            onClick={() => setActiveSubMenuId(sub.id)}
            className={`flex-shrink-0 px-4 py-2 rounded-full text-[14px] font-medium transition-all duration-200 border 
              ${isSubActive 
              ? "bg-google-blue text-white border-google-blue shadow-sm" 
              : "bg-white text-google-textSecondary border-gray-200 hover:bg-gray-50 hover:text-google-text"
            }`}
          >
            {sub.name}
          </button>
        )
      })}
    </div>

    <div className="flex-1 overflow-y-auto p-4 sm:p-8 bg-[#F3F4F6]">
      <div className="mx-auto max-w-[1400px]">
        {filteredLessons.length > 0 ? (
          <div className="flex flex-col">
            {filteredLessons.map(lesson => (
              <LessonRow key={lesson.id} lesson={lesson} />
            ))}
          </div>
        ) : (
          <div className="mt-6 flex flex-col items-center justify-center rounded-3xl border border-dashed border-gray-300 bg-white p-12 text-center shadow-sm">
            <div className="h-16 w-16 mb-4 rounded-full bg-gray-100 flex items-center justify-center text-gray-400">
               <svg className="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>
            </div>
            <h3 className="text-[17px] font-semibold text-google-text mb-1">Chưa có bài học nào</h3>
            <p className="text-google-textSecondary text-sm">Quản trị viên đang cập nhật tài liệu cho phần này.</p>
          </div>
        )}
      </div>
    </div>
  </div>
  );
}

  const CORRECT_PASSWORD = "nonganewgen2026";

  const [isAuthorized, setIsAuthorized] = useState(true); 
  const [error, setError] = useState("");
  const [isLoading, setIsLoading] = useState(false);

  useEffect(() => {
    try {
      const authStatus = sessionStorage.getItem("web_authorized");
      if (authStatus === "true") setIsAuthorized(true);
    } catch (err) {}
    setIsLoading(false);
  }, []);

  const handleLogin = (e) => {
    e.preventDefault();
    if (password === CORRECT_PASSWORD) {
      try { sessionStorage.setItem("web_authorized", "true"); } catch (err) {}
      setIsAuthorized(true);
      setError("");
    } else {
      setError("Mật khẩu không chính xác. Vui lòng thử lại.");

  if (isAuthorized) return <Dashboard />;

  return (
  <div className="flex min-h-screen items-center justify-center bg-google-bg p-4">

          <svg className="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M12 21v-8.25M15.75 21v-8.25M8.25 21v-8.25M3 9l9-6 9 6m-1.5 12V10.332A48.315 48.315 0 0012 9.75c-2.551 0-5.056.2-7.5.582V21M3 21h18M12 6.75h.008v.008H12V6.75z" /></svg>
        </div>
        <h1 className="text-2xl font-bold tracking-tight text-google-text mb-2">Đăng nhập hệ thống</h1>
        <p className="text-sm text-google-textSecondary">Đào tạo kỹ thuật nông nghiệp Newgen</p>
      </div>

      <form onSubmit={handleLogin} className="space-y-5">
        <div>
          <input 
            type="password" 
            placeholder="Nhập mã khóa truy cập..." 
            value={password} 
            onChange={(e) => setPassword(e.target.value)} 
            className="w-full rounded-xl border border-gray-300 bg-gray-50 px-4 py-3.5 text-[15px] transition-all focus:border-google-blue focus:bg-white focus:outline-none focus:ring-4 focus:ring-google-lightBlue" 
            required 
          />
        </div>
        {error && (
          <div className="flex items-center gap-2 text-[13px] font-medium text-red-600 bg-red-50 p-3 rounded-xl border border-red-100">
            <svg className="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clipRule="evenodd"></path></svg>
            {error}
          </div>
        )}
        <button type="submit" className="w-full rounded-xl bg-google-blue py-3.5 text-center text-[15px] font-semibold text-white shadow-sm transition-all hover:bg-[#0842A0] focus:outline-none focus:ring-4 focus:ring-google-lightBlue">
          Mở khóa hệ thống
        </button>
      </form>
      <p className="mt-8 text-center text-[12px] text-gray-400">Mọi hành vi truy cập trái phép sẽ bị ghi lại.</p>
    </div>
  </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
