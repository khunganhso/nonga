  useEffect(() => {
    const onFullscreenChange = () => { setIsFullscreen(!!document.fullscreenElement); };
    document.addEventListener('fullscreenchange', onFullscreenChange);
    return () => document.removeEventListener('fullscreenchange', onFullscreenChange);
  }, []);

  const handleFullScreen = () => {
    if (!document.fullscreenElement && containerRef.current) {
      containerRef.current.requestFullscreen().catch(err => console.log(err));
    }
  };

  const hasContent = lesson.content ? lesson.content.trim() !== "" : false;
  
  const defaultRatio = hasContent ? '1 / 1.414' : '1200 / 3600';
  const ratioStyle = lesson.canvaUrl ? { aspectRatio: lesson.canvaRatio || defaultRatio } : (lesson.youtubeId ? { aspectRatio: '16 / 9' } : { minHeight: '300px' });

  const renderMedia = () => {
    if (lesson.canvaUrl) {
      return <iframe className="absolute inset-0 w-full h-full bg-white block" src={lesson.canvaUrl} allowFullScreen allow="fullscreen" style={{border: 'none'}} title={`Canva - ${lesson.title}`}></iframe>;
    } else if (lesson.youtubeId) {
      return <iframe className="absolute inset-0 w-full h-full bg-black block" src={`https://www.youtube-nocookie.com/embed/${lesson.youtubeId}?modestbranding=1&rel=0`} allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowFullScreen title={`Youtube - ${lesson.title}`}></iframe>;
    } else if (lesson.thumbnail) {
      return <img src={lesson.thumbnail} alt={lesson.title} className="absolute inset-0 w-full h-full object-contain bg-white" />;
    } else {
      return (
        <div className="absolute inset-0 flex flex-col items-center justify-center text-gray-400 p-10 text-center bg-gray-50">
          <svg className="w-12 h-12 mb-3 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
          <p className="text-[14px] font-medium">Chưa có nội dung đính kèm</p>
        </div>
      );
    }
  };

  if (hasContent) {
    return (
      <div className="flex flex-col lg:flex-row gap-6 bg-white rounded-2xl border border-gray-100 p-5 shadow-[0_2px_12px_-4px_rgba(0,0,0,0.08)] mb-8 transition-all hover:shadow-md">
        <div className="w-full lg:w-[40%] flex flex-col pt-2">
          <h2 className="text-[18px] sm:text-[20px] font-bold text-gray-800 mb-4 tracking-tight leading-snug">{lesson.title}</h2>
          <div className="prose max-w-none flex-1" dangerouslySetInnerHTML={{ __html: lesson.content || "" }} />
        </div>
        <div className="w-full lg:w-[60%] rounded-xl overflow-hidden bg-gray-50 border border-gray-100 relative" style={ratioStyle}>
          {renderMedia()}
        </div>
      </div>
    );
  }

  return (
    <div className="flex flex-col bg-white rounded-[20px] border border-gray-100 shadow-[0_2px_16px_-6px_rgba(0,0,0,0.08)] mb-10 overflow-hidden">
      <div className="px-6 py-4 border-b border-gray-50 flex items-center justify-between">
         <h2 className="text-[17px] sm:text-[19px] font-bold text-gray-800 tracking-tight">{lesson.title}</h2>
         {!isFullscreen && (lesson.canvaUrl || lesson.youtubeId) && (
            <button onClick={handleFullScreen} className="text-gray-400 hover:text-google-blue transition-colors flex items-center gap-1.5 text-sm font-medium">
               <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg>
               <span className="hidden sm:inline">Phóng to</span>
            </button>
         )}
      </div>
      
      <div ref={containerRef} className="w-full bg-[#f4f6f8] relative" style={ratioStyle}>
        {renderMedia()}
      </div>
    </div>
  );
}

// =========================================================================
// GIAO DIỆN HIỂN THỊ CHÍNH
// =========================================================================
function Dashboard() {
  const [activeMenuId, setActiveMenuId] = useState(mainMenus[0].id);
  const [activeSubMenuId, setActiveSubMenuId] = useState("ALL"); 

  const currentMenu = mainMenus.find(m => m.id === activeMenuId) || mainMenus[0];

  const filteredLessons = lessons.filter(lesson => {
    if (activeSubMenuId === "ALL") {
      return currentMenu.subItems ? currentMenu.subItems.some(sub => sub.id === lesson.categoryId) : false;
    }
    return lesson.categoryId === activeSubMenuId;
  });

  const handleMenuChange = (menuId) => {
    setActiveMenuId(menuId);
    setActiveSubMenuId("ALL"); 
  };

  return (
  <div className="flex flex-col h-screen w-full overflow-hidden bg-[#F4F6F8]">
    
    {/* MENU CHÍNH */}
    <div className="bg-white px-3 sm:px-6 py-2 flex items-center overflow-x-auto border-b border-gray-200 flex-shrink-0 gap-1.5 scrollbar-hide z-20 relative">
      {mainMenus.map((item) => {
        const isActive = activeMenuId === item.id;
        return (
          <button
            key={item.id}
            onClick={() => handleMenuChange(item.id)}
            className={`flex flex-shrink-0 items-center gap-2 rounded-full px-4 py-2 text-[14px] font-semibold uppercase tracking-wide transition-all duration-200 
            ${isActive 
              ? "bg-google-lightBlue text-google-blue shadow-sm" 
              : "text-gray-500 hover:bg-gray-50 hover:text-gray-800"
            }`}
          >
            <div className={`${isActive ? "text-google-blue" : "text-gray-400"}`}>
               <item.icon />
            </div>
            <span className="whitespace-nowrap">{item.name}</span>
          </button>
        );
      })}
    </div>

    {/* TAG CON */}
    <div className="bg-white/80 backdrop-blur-md px-4 sm:px-6 py-2.5 flex items-center overflow-x-auto border-b border-gray-100 flex-shrink-0 gap-2 scrollbar-hide z-10 relative">
      <button
        onClick={() => setActiveSubMenuId("ALL")}
        className={`flex-shrink-0 px-4 py-1.5 rounded-full text-[13px] font-medium transition-all duration-200 border 
          ${activeSubMenuId === "ALL" 
          ? "bg-google-blue text-white border-google-blue" 
          : "bg-transparent text-gray-500 border-gray-200 hover:border-gray-300 hover:text-gray-800"
        }`}
      >
        Tất Cả Mục
      </button>
      {currentMenu.subItems && currentMenu.subItems.map(sub => {
        const isSubActive = activeSubMenuId === sub.id;
        return (
          <button
            key={sub.id}
            onClick={() => setActiveSubMenuId(sub.id)}
            className={`flex-shrink-0 px-4 py-1.5 rounded-full text-[13px] font-medium transition-all duration-200 border 
              ${isSubActive 
              ? "bg-google-blue text-white border-google-blue" 
              : "bg-transparent text-gray-500 border-gray-200 hover:border-gray-300 hover:text-gray-800"
            }`}
          >
            {sub.name}
          </button>
        )
      })}
    </div>

    {/* NỘI DUNG */}
    <div className="flex-1 overflow-y-auto p-4 sm:p-8">
      <div className="mx-auto max-w-[1200px]">
        {filteredLessons.length > 0 ? (
          <div className="flex flex-col">
            {filteredLessons.map(lesson => (
              <LessonRow key={lesson.id} lesson={lesson} />
            ))}
          </div>
        ) : (
          <div className="mt-8 flex flex-col items-center justify-center rounded-2xl border border-dashed border-gray-200 bg-white p-16 text-center shadow-sm">
            <div className="h-16 w-16 mb-4 rounded-full bg-gray-50 flex items-center justify-center text-gray-300">
               <svg className="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>
            </div>
            <h3 className="text-[16px] font-semibold text-gray-800 mb-1">Chưa có bài học nào</h3>
            <p className="text-gray-500 text-sm">Nội dung chuyên môn đang được cập nhật.</p>
          </div>
        )}
      </div>
    </div>
  </div>
  );
}

// =========================================================================
// MÀN HÌNH ĐĂNG NHẬP
// =========================================================================
function App() {
  const CORRECT_PASSWORD = "nonganewgen2026";
  const [password, setPassword] = useState("");
  const [isAuthorized, setIsAuthorized] = useState(true); 
  const [error, setError] = useState("");
  const [isLoading, setIsLoading] = useState(false);

  useEffect(() => {
    try {
      const authStatus = sessionStorage.getItem("web_authorized");
      if (authStatus === "true") setIsAuthorized(true);
    } catch (err) {}
    setIsLoading(false);
  }, []);

  const handleLogin = (e) => {
    e.preventDefault();
    if (password === CORRECT_PASSWORD) {
      try { sessionStorage.setItem("web_authorized", "true"); } catch (err) {}
      setIsAuthorized(true);
      setError("");
    } else {
      setError("Mật khẩu không chính xác. Vui lòng thử lại.");
    }
  };

  if (isLoading) return <div className="min-h-screen bg-google-surface"></div>;
  if (isAuthorized) return <Dashboard />;

  return (
  <div className="flex min-h-screen items-center justify-center bg-[#F4F6F8] p-4">
    <div className="w-full max-w-[400px] overflow-hidden rounded-[24px] border border-gray-100 bg-white shadow-xl p-8 sm:p-10">
      <div className="text-center mb-8">
        <div className="mx-auto mb-5 flex h-14 w-14 items-center justify-center rounded-2xl bg-google-blue shadow-md shadow-blue-500/20">
          <svg className="h-7 w-7 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M12 21v-8.25M15.75 21v-8.25M8.25 21v-8.25M3 9l9-6 9 6m-1.5 12V10.332A48.315 48.315 0 0012 9.75c-2.551 0-5.056.2-7.5.582V21M3 21h18M12 6.75h.008v.008H12V6.75z" /></svg>
        </div>
        <h1 className="text-2xl font-bold tracking-tight text-gray-800 mb-1">Đăng nhập hệ thống</h1>
        <p className="text-sm text-gray-500">Đào tạo kỹ thuật Nông Á Newgen</p>
      </div>

      <form onSubmit={handleLogin} className="space-y-5">
        <div>
          <input 
            type="password" 
            placeholder="Nhập mã khóa truy cập..." 
            value={password} 
            onChange={(e) => setPassword(e.target.value)} 
            className="w-full rounded-xl border border-gray-200 bg-gray-50 px-4 py-3.5 text-[15px] transition-all focus:border-google-blue focus:bg-white focus:outline-none focus:ring-2 focus:ring-google-lightBlue" 
            required 
          />
        </div>
        {error && (
          <div className="flex items-center gap-2 text-[13px] font-medium text-red-600 bg-red-50 p-3 rounded-xl border border-red-100">
            <svg className="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clipRule="evenodd"></path></svg>
            {error}
          </div>
        )}
        <button type="submit" className="w-full rounded-xl bg-google-blue py-3.5 text-center text-[15px] font-semibold text-white shadow-md transition-all hover:bg-[#0842A0] focus:outline-none focus:ring-2 focus:ring-google-lightBlue">
          Mở khóa hệ thống
        </button>
      </form>
    </div>
  </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
