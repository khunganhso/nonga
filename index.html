<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">

    <title>Khung Ảnh Số SaaS V112</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700&family=Tourney:wght@600&family=Playfair+Display:wght@700&family=Oswald:wght@600&family=Righteous&family=Courier+Prime:wght@700&family=Cinzel:wght@700&display=swap" rel="stylesheet">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #000000; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; cursor: pointer; }
        
        #outer-blur-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; filter: blur(45px) brightness(0.6); z-index: 0; transform: scale(1.2); }
        #white-border-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #ffffff; z-index: 1; transition: opacity 1.5s ease-in-out; }
        #frame-wrapper { position: absolute; top: 45px; bottom: 45px; left: 45px; right: 45px; background-color: #000; overflow: hidden; box-shadow: 0px 15px 45px rgba(0, 0, 0, 0.15), inset 0px 0px 30px rgba(0,0,0,0.85); border: 1px solid #eaeaea; transition: all 0.5s ease; z-index: 5; }
        
        #photo-container, .slide-group { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        #photo-container { z-index: 1; }
        .slide-group { opacity: 0; transition: opacity 3s ease-in-out; display: block; }
        .slide-group.active { opacity: 1; z-index: 2; }
        
        .background-blur { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover !important; filter: blur(40px) brightness(0.85); -webkit-filter: blur(40px) brightness(0.85); transform: scale(1.3); z-index: 1; display: none; }
        .foreground-image { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; flex-shrink: 0; filter: drop-shadow(0px 15px 35px rgba(0,0,0,0.6)); -webkit-filter: drop-shadow(0px 15px 35px rgba(0,0,0,0.6)); transition: all 0.5s ease; }
        .slide-group.show-blur .background-blur { display: block; }
        .fit-cover { object-fit: cover !important; width: 100% !important; height: 100% !important; }
        .fit-contain { object-fit: contain !important; width: 100% !important; height: 100% !important; }

        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.15); z-index: 3; pointer-events: none; }
        #brightness-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0); z-index: 998; pointer-events: none; transition: background 0.5s ease; }

        .tap-target { -webkit-tap-highlight-color: transparent; outline: none; border: none; background: transparent; cursor: pointer; transition: opacity 0.2s; }
        .tap-target:active { opacity: 0.6; }

        /* CỘT TRÁI TRÊN */
        #info-container { position: absolute; top: 35px; left: 35px; z-index: 4; text-shadow: 0px 2px 8px rgba(0, 0, 0, 0.6); display: flex; flex-direction: column; align-items: center; width: auto; transition: transform 2s ease-in-out; }
        #clock-flex-wrapper { display: flex; flex-direction: column; align-items: center; width: 100%; }
        .hours-style, .minutes-style { font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 6.5rem; letter-spacing: -2px; display: block; line-height: 0.85; transition: color 0.5s, font-family 0.5s; width: 100%; text-align: center; } 
        .hours-style { color: #F4B41A; } .minutes-style { color: #ffffff; margin-top: 4px; }
        #date-solar-top { font-size: 1.4rem; font-weight: 700; color: #ffffff; margin-top: 14px; white-space: nowrap; text-align: center; }
        #date-lunar-top { font-size: 1.4rem; font-weight: 700; color: #ffffff; margin-top: 4px; white-space: nowrap; text-align: center; }
        .highlight-yellow { color: #F4B41A; font-weight: 700; }

        /* CỘT PHẢI TRÊN */
        #top-right-wrapper { position: absolute; top: 35px; right: 45px; z-index: 4; display: flex; flex-direction: column; align-items: center; gap: 8px; text-shadow: 0px 2px 5px rgba(0,0,0,0.6); transition: transform 2s ease-in-out; }
        #temp-wrapper { position: relative; display: inline-flex; align-items: flex-start; justify-content: center; margin-right: 15px; } 
        #weather-val { font-family: 'Montserrat', sans-serif; font-weight: 700; color: #ffffff; letter-spacing: -2px; line-height: 0.8; font-size: 3.8rem; display: inline-block; }
        .degree-symbol { position: absolute; font-weight: 700; color: #ffffff; font-size: 1.5rem; top: 0; right: -18px; }
        #right-env-container { display: flex; flex-direction: column; align-items: center; margin-right: 0; width: auto; }
        .env-rotating-item { padding: 0; background: transparent; white-space: nowrap; transition: opacity 0.5s ease; color: rgba(255, 255, 255, 0.95); font-weight: 600; text-align: center; display: flex; justify-content: center; align-items: center; }

        @-webkit-keyframes pulseGlow { 0% { opacity: 0.8; } 50% { opacity: 1; } 100% { opacity: 0.8; } }
        @keyframes pulseGlow { 0% { opacity: 0.8; } 50% { opacity: 1; } 100% { opacity: 0.8; } }

        /* KHU VỰC ĐÁY */
        #bottom-container { position: absolute; bottom: 35px; left: 35px; right: 35px; z-index: 4; display: flex; flex-direction: row; align-items: flex-end; justify-content: space-between; text-shadow: 0px 2px 8px rgba(0, 0, 0, 0.7); gap: 30px; transition: transform 2s ease-in-out; }
        #bottom-left-events { display: flex; flex-direction: column; align-items: flex-start; gap: 3px; flex-shrink: 0; }
        .event-header { font-size: 1.1rem; color: #F4B41A; font-weight: 700; text-align: left; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px; cursor: pointer; }
        .event-item { font-size: 1.15rem; color: rgba(255, 255, 255, 0.95); font-weight: 600; text-align: left; padding: 4px 12px; border-radius: 4px; background: rgba(0, 0, 0, 0.4); margin-bottom: 2px; display: inline-block;}
        .event-passed { opacity: 0.35; font-size: 1rem; }
        .event-urgent { color: #F4B41A !important; font-weight: 700; background: rgba(0, 0, 0, 0.7); -webkit-animation: pulseGlow 2s infinite; animation: pulseGlow 2s infinite; }
        .event-today-birth { color: #2ecc71 !important; font-weight: 700; font-size: 1.25rem; background: rgba(0, 0, 0, 0.8); }

        #bottom-right-text { flex: 1; display: flex; flex-direction: column; align-items: flex-end; justify-content: flex-end; text-align: right; margin-left: 30px; cursor: pointer; }
        #quote-row { font-size: 1.15rem; font-weight: 500; font-style: normal; color: #f5f5f7; line-height: 1.5; word-wrap: break-word; text-align: right; width: 100%; }
        .countdown-highlight { color: #F4B41A; font-weight: 700; }
        .death-highlight { color: #ff9500; font-weight: 700; }
        .death-event-passed { color: #a1a1a1; font-weight: 500; opacity: 0.6; }

        /* BẢNG MODAL CHUNG */
        .modal-base { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(15px); padding: 25px; border-radius: 16px; border: 1px solid #F4B41A; z-index: 10001; display: none; flex-direction: column; gap: 15px; width: 340px; box-shadow: 0px 10px 40px rgba(0,0,0,0.8); }
        .show-modal { display: flex !important; }
        .modal-title { color: #F4B41A; font-weight: 700; font-size: 1.3rem; text-align: center; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        .list-item { color: #fff; padding: 10px 5px; border-bottom: 1px solid rgba(255,255,255,0.15); font-size: 1.1rem; font-weight: 500; text-align: left;}
        .list-item:last-child { border-bottom: none; }
        #list-content { overflow-y: auto; max-height: 350px; padding-right: 10px; }
        
        .loc-input { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); color: #fff; padding: 12px 15px; border-radius: 8px; font-size: 1.05rem; width: 100%; outline: none; font-family: inherit; font-weight: 500;}
        .loc-input::placeholder { color: #aaa; font-weight: 400; }
        .loc-input:focus { border-color: #F4B41A; background: rgba(255,255,255,0.15); }
        .loc-btns { display: flex; gap: 10px; margin-top: 5px; }
        .loc-btn { flex: 1; padding: 12px; font-weight: 700; border-radius: 8px; cursor: pointer; border: none; font-size: 1rem; transition: transform 0.1s;}
        .btn-save { background: #F4B41A; color: #000; }
        .btn-default { background: transparent; color: #fff; border: 1px solid #fff; }
        .btn-close-modal { background: transparent; color: #aaa; font-weight: 400; border: none; font-size: 0.95rem; text-align: center; margin-top: -5px; padding: 5px; cursor: pointer; }
        
        #toast-msg { position: absolute; top: 15%; left: 50%; transform: translateX(-50%); background: rgba(0, 0, 0, 0.85); color: #F4B41A; border: 1px solid #F4B41A; padding: 12px 24px; border-radius: 8px; font-size: 1.2rem; font-weight: 700; z-index: 10000; opacity: 0; pointer-events: none; transition: opacity 0.5s ease; text-align: center; box-shadow: 0px 4px 15px rgba(0,0,0,0.5); }
        #toast-msg.show { opacity: 1; }

        #night-clock-box { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); display: none; z-index: 4; text-shadow: none; transition: transform 2s ease-in-out; }
        .night-active #white-border-bg { background-color: #000000 !important; opacity: 1 !important; } 
        .night-active #photo-container, .night-active #bottom-container, .night-active #top-right-wrapper, .night-active #info-container { display: none !important; }
        .night-active #frame-wrapper { background-color: transparent !important; box-shadow: none !important; border-color: transparent !important; }
        .night-active #night-clock-box { display: flex; align-items: center; justify-content: center; flex-direction: row; }
        .night-hours, .night-minutes { font-family: 'Tourney', cursive !important; font-weight: 600 !important; color: #FF9500 !important; font-size: 46vmin; line-height: 0.9; margin: 0 1vmin; letter-spacing: -2vmin; }

        /* 🌟 ĐÃ VÁ LỖI CẤU TRÚC MOBILE: Rút gọn font chữ để đồng hồ và thời tiết tuyệt đối không đè nhau */
        @media (orientation: portrait) {
            .hours-style, .minutes-style { font-size: 5rem; text-align: center; letter-spacing: -1px; } 
            #date-solar-top { font-size: 1.3rem; text-align: center; } 
            #date-lunar-top { font-size: 1.3rem; text-align: center; }
            #info-container { top: 30px; left: 20px; align-items: center; }
            #top-right-wrapper { top: 30px; right: 20px; gap: 4px; }
            #weather-val { font-size: 2.6rem; }
            .degree-symbol { font-size: 1.1rem; right: -12px; }
            .env-rotating-item { font-size: 1rem; }
            
            #bottom-container { flex-direction: column; align-items: stretch; gap: 15px; left: 20px; right: 20px; bottom: 30px; }
            #bottom-left-events { align-items: flex-start; max-width: 100%; width: 100%; }
            #bottom-right-text { text-align: right; align-items: flex-end; margin-left: 0; width: 100%; }
            #quote-row { font-size: 1.05rem; line-height: 1.45; text-align: right; }
            
            .night-active #night-clock-box { flex-direction: column; }
            .night-hours, .night-minutes { font-size: 42vmin; margin: 0; line-height: 0.85; letter-spacing: -2vmin; }
        }
    </style>
</head>
<body>

    <img id="outer-blur-bg" src="">
    <div id="white-border-bg"></div>

    <div id="frame-wrapper">
        <div id="photo-container">
            <div id="group1" class="slide-group active"><img id="bg1" class="background-blur"><img id="fg1" class="foreground-image"></div>
            <div id="group2" class="slide-group"><img id="bg2" class="background-blur"><img id="fg2" class="foreground-image"></div>
        </div>
        <div class="overlay"></div>
        <div id="brightness-overlay"></div>
        <div id="toast-msg">Thông báo</div>

        <!-- CỘT TRÁI TRÊN -->
        <div id="info-container">
            <div id="clock-flex-wrapper">
                <span class="hours-style tap-target" id="hr-node" ontouchstart="handleAction(event, 'night')" onclick="handleAction(event, 'night')">00</span>
                <span class="minutes-style tap-target" id="min-node" ontouchstart="handleAction(event, 'style')" onclick="handleAction(event, 'style')">00</span>
            </div>
            <div id="date-solar-top" class="tap-target" ontouchstart="handleAction(event, 'wakeup')" onclick="handleAction(event, 'wakeup')">Th 0 00/00</div>
            <div id="date-lunar-top" class="tap-target" ontouchstart="handleAction(event, 'interval')" onclick="handleAction(event, 'interval')"><span class="highlight-yellow">AL</span> 00/00</div>
        </div>
        
        <div id="night-clock-box">
            <span class="night-hours tap-target" id="night-hr-node" ontouchstart="handleAction(event, 'night')" onclick="handleAction(event, 'night')">00:</span>
            <span class="night-minutes tap-target" id="night-min-node" ontouchstart="handleAction(event, 'night')" onclick="handleAction(event, 'night')">00</span>
        </div>

        <!-- CỘT PHẢI TRÊN -->
        <div id="top-right-wrapper">
            <div id="right-env-container" class="tap-target" ontouchstart="handleAction(event, 'open_location')" onclick="handleAction(event, 'open_location')"></div>
            <div id="temp-wrapper" class="tap-target" ontouchstart="handleAction(event, 'next')" onclick="handleAction(event, 'next')">
                <span id="weather-val">--</span><span class="degree-symbol">°</span>
            </div>
        </div>
        
        <!-- CỘT ĐÁY -->
        <div id="bottom-container">
            <div id="bottom-left-events" class="tap-target" ontouchstart="handleAction(event, 'show_birth')" onclick="handleAction(event, 'show_birth')"></div>
            <div id="bottom-right-text" class="tap-target" ontouchstart="handleAction(event, 'show_death')" onclick="handleAction(event, 'show_death')">
                <span id="quote-row" style="color:#00E5FF; font-weight:700;">[1/5] Khởi động hệ thống V112 Master...</span>
            </div>
        </div>
        
        <!-- BẢNG CÀI ĐẶT VỊ TRÍ -->
        <div id="location-modal" class="modal-base">
            <div class="modal-title">CÀI ĐẶT VỊ TRÍ</div>
            <input type="text" id="loc-name" class="loc-input" placeholder="Tên địa phương">
            <input type="text" inputmode="decimal" id="loc-lat" class="loc-input" placeholder="Vĩ độ">
            <input type="text" inputmode="decimal" id="loc-lon" class="loc-input" placeholder="Kinh độ">
            <div class="loc-btns">
                <button class="loc-btn btn-save" ontouchstart="saveLocation(); event.preventDefault();" onclick="saveLocation()">LƯU</button>
                <button class="loc-btn btn-default" ontouchstart="defaultLocation(); event.preventDefault();" onclick="defaultLocation()">MẶC ĐỊNH</button>
            </div>
            <button class="btn-close-modal" ontouchstart="closeLocationModal(); event.preventDefault();" onclick="closeLocationModal()">Đóng (Hủy)</button>
        </div>

        <div id="list-modal" class="modal-base">
            <div id="list-title" class="modal-title">DANH SÁCH</div>
            <div id="list-content"></div>
            <button class="btn-close-modal" style="margin-top:10px;" ontouchstart="closeListModal(); event.preventDefault();" onclick="closeListModal()">Đóng bảng</button>
        </div>
    </div>

        function syncDriveData() {

            xhrConfig.onreadystatechange = function() { if (xhrConfig.readyState === 4 && xhrConfig.status === 200) { var data = JSON.parse(xhrConfig.responseText); if (data.files && data.files.length > 0) { downloadConfigFile(data.files[0].id); } } };

            xhrDrive.open('GET', 'https://www.googleapis.com/drive/v3/files?q=' + imgQuery + '&orderBy=createdTime desc&pageSize=1000&key=' + API_KEY + '&fields=files(id,createdTime)', true);
            xhrDrive.onreadystatechange = function() {
                if (xhrDrive.readyState === 4) {
                    if (xhrDrive.status === 200) {
                        var data = JSON.parse(xhrDrive.responseText);
                        if (data.files && data.files.length > 0) {
                            writeDebug("[4/5] Kết nối thành công! Đang thiết lập luồng " + data.files.length + " bức ảnh...", "#2ecc71");
                            var allImgs = []; var recentImgs = []; var twoDaysAgo = new Date(Date.now() - 48 * 60 * 60 * 1000);

                                var fileId = data.files[i].id;
                                allImgs.push(fileId);
                                if (new Date(data.files[i].createdTime) >= twoDaysAgo) { recentImgs.push(fileId); }
                            }
                            function shuffle(arr) { var a = arr.slice(); for (var k = a.length - 1; k > 0; k--) { var j = Math.floor(Math.random() * (k + 1)); var t = a[k]; a[k] = a[j]; a[j] = t; } return a; }

                    }
                }
            }; xhrDrive.send();
        }
